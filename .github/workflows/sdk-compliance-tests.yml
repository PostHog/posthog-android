name: SDK Compliance Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'posthog/**'
      - 'sdk_compliance_adapter/**'
      - '.github/workflows/sdk-compliance-tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'posthog/**'
      - 'sdk_compliance_adapter/**'
      - '.github/workflows/sdk-compliance-tests.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pull-requests: write

jobs:
  test-android-sdk:
    uses: PostHog/posthog-sdk-test-harness/.github/workflows/test-sdk-action.yml@68498bcf3ae95ac941476e6ca3d42d6086e1c7fd
    with:
      adapter-dockerfile: sdk_compliance_adapter/Dockerfile
      adapter-context: .
      test-harness-version: "0.9.0"
      report-name: android-sdk-compliance-report
