name: 'Changeset coverage'

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened]

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: changeset-coverage-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    check:
        name: Check changeset coverage
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
                  fetch-depth: 0

            - name: Setup environment
              uses: ./.github/actions/setup
              with:
                  install: false

            - name: Compute coverage report
              id: coverage
              env:
                  BASE_REF: ${{ github.event.pull_request.base.ref }}
              run: node scripts/check-changeset-coverage.mjs >> "$GITHUB_OUTPUT"

            - name: Upsert or delete sticky PR comment
              uses: actions/github-script@v7
              env:
                  COMMENT_BODY: ${{ steps.coverage.outputs.body }}
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const marker = '<!-- changeset-coverage -->';
                      const body = process.env.COMMENT_BODY || '';

                      const { data: comments } = await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                      });
                      const existing = comments.find(
                          (c) => c.user.type === 'Bot' && c.body.includes(marker),
                      );

                      if (!body) {
                          if (existing) {
                              await github.rest.issues.deleteComment({
                                  owner: context.repo.owner,
                                  repo: context.repo.repo,
                                  comment_id: existing.id,
                              });
                              console.log('Deleted stale changeset-coverage comment');
                          }
                          return;
                      }

                      if (existing) {
                          await github.rest.issues.updateComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              comment_id: existing.id,
                              body,
                          });
                          console.log('Updated existing changeset-coverage comment');
                      } else {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: context.issue.number,
                              body,
                          });
                          console.log('Created changeset-coverage comment');
                      }
