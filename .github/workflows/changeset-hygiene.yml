name: 'Changeset hygiene'

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened]

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: changeset-hygiene-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    check:
        # NOTE: while PostHog/.github#39 is open, pin to feat/changeset-hygiene.
        # Update both `uses:` and `script-ref` to `@main` once that PR merges.
        uses: PostHog/.github/.github/workflows/changeset-hygiene.yml@feat/changeset-hygiene
        with:
            script-ref: feat/changeset-hygiene
