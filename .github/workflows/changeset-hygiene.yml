name: 'Changeset hygiene'

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened]

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: changeset-hygiene-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    check:
        uses: PostHog/.github/.github/workflows/changeset-hygiene.yml@main
