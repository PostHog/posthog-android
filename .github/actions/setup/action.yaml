name: "Setup Workspace Environment"
description: "Sets up a Node.js environment with pnpm and installs dependencies"

inputs:
  node_version:
    description: "Node.js version to use"
    required: false
    default: "24"
  install:
    description: "Whether to install dependencies"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup pnpm and Node.js
      uses: pnpm/setup@f7d0e5f4b1b3089d2799ef9722859e7ba314c4c8 # v1
      with:
        runtime: node@${{ inputs.node_version }}
        cache: true
        install: false

    - name: Install package.json dependencies with pnpm
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile
