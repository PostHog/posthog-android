name: posthog-android-sdk-compliance

services:
  sdk-adapter:
    build:
      context: ..
      dockerfile: sdk_compliance_adapter/Dockerfile
    networks:
      - test-network
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx512m

  test-harness:
    image: ghcr.io/posthog/sdk-test-harness:0.8.0
    command: ["run", "--adapter-url", "http://sdk-adapter:8080", "--mock-url", "http://test-harness:8081", "--sdk-type", "client", "--suite", "capture", "--debug"]
    networks:
      - test-network
    depends_on:
      - sdk-adapter

networks:
  test-network:
    driver: bridge
